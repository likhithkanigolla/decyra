version: '3.8'

services:
  app:
    build: .
    container_name: decyra_app
    ports:
      - "17052:3000"
    environment:
      - DATABASE_TYPE=postgres
      - VITE_DATABASE_TYPE=postgres
      - LOCAL_DEV_MODE=false
      # Use the docker internal network hostname `postgres`
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-decyra}
      # Fallback stub for Supabase environment checks
      - SUPABASE_URL=http://placeholder.supabase.co
      - SUPABASE_PUBLISHABLE_KEY=placeholder_key
      # Node.js performance: increase libuv thread pool for concurrent I/O
      - UV_THREADPOOL_SIZE=16
      # Connection pool size (tune down if the server has limited RAM)
      - POSTGRES_POOL_MAX=10
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    # Prevent OOM-kill from slowing/crashing the app container
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: decyra_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-decyra}
    # Tune Postgres for a small Docker deployment
    command: >
      postgres
        -c shared_buffers=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
        -c effective_cache_size=256MB
        -c synchronous_commit=off
    ports:
      - "17053:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
