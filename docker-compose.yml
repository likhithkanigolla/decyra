version: '3.8'

services:
  app:
    build: .
    container_name: decyra_app
    ports:
      - "17052:3000"
    environment:
      - DATABASE_TYPE=postgres
      - VITE_DATABASE_TYPE=postgres
      - LOCAL_DEV_MODE=false
      # Use the docker internal network hostname `postgres`
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-decyra}
      # Fallback stub for Supabase environment checks
      - SUPABASE_URL=http://placeholder.supabase.co
      - SUPABASE_PUBLISHABLE_KEY=placeholder_key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  postgres:
    image: postgres:16-alpine
    container_name: decyra_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-decyra}
    ports:
      - "17053:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
